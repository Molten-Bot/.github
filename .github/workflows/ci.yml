name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "moltenhub-*"

jobs:
  validate-repo:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository validator
        run: ./scripts/validate-repo.sh
