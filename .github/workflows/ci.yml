name: ci

on:
  push:
    branches:
      - main
      - moltenhub-*
  pull_request:
    branches:
      - main

jobs:
  repository-checks:
    name: repository-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository layout
        run: bash scripts/validate-repo.sh
